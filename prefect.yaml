# Prefect Cloud Deployment Configuration
# IGAD-ICPAC Hydrology Data Pipeline

name: hydrology-data-sync
description: "Daily synchronization of hydrology data from FTP to GCS"

# Version and build settings
version: "3.0.0"

# Use git clone from gcs_upload branch - files now at root level
pull:
  - prefect.deployments.steps.git_clone:
      repository: https://github.com/icpac-igad/DevOps-hazard-modeling.git
      branch: gcs_upload
  - prefect.deployments.steps.run_shell_script:
      script: |
        pip install google-cloud-storage>=2.10.0 google-auth>=2.17.0 python-dotenv>=1.0.0

# Deployment definitions
deployments:
  - name: "hydrology-midnight-sync"
    version: "3.0.0"
    tags: ["hydrology", "ftp", "gcs", "icpac", "production"]
    description: "Daily midnight synchronization of hydrology data"
    
    # Entry point - local file for deployment, runtime path handled by working_dir
    entrypoint: "ftp_to_gcs_sync.py:hydrology_sync_flow"
    
    # Scheduling - runs every day at midnight UTC
    schedule:
      cron: "0 0 * * *"
      timezone: "UTC"
    
    # Parameters (can be overridden at runtime)
    parameters: {}
    
    job_variables:
      image: "prefecthq/prefect:3-python3.11"
      pip_packages:
        - "prefect>=3.0.0"
        - "google-cloud-storage>=2.10.0"
        - "python-dotenv>=1.0.0"
        - "google-auth>=2.17.0"
        - "google-oauth2-tool>=0.0.3"
    
    # Retry configuration
    flow_run_name: "hydrology-sync-{{ now() }}"
    

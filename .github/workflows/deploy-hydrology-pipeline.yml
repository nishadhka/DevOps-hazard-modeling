name: Test, Build and Deploy Hydrology Pipeline

on:
  push:
    branches: [gcs_upload, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test Pipeline
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install prefect>=3.0.0
          pip install google-cloud-storage>=2.10.0
          pip install python-dotenv>=1.0.0
          pip install pytest pytest-cov

      - name: Run syntax check
        run: |
          python -m py_compile ftp_to_gcs_sync.py

      - name: Run basic tests
        run: |
          # Test imports
          python -c "import ftp_to_gcs_sync; print('Import successful')"
          
          # Test configuration loading (will fail gracefully without .env)
          python -c "
          try:
              from ftp_to_gcs_sync import HydrologyDataSync
              print('Class instantiation test passed')
          except ValueError as e:
              if 'Missing required configuration' in str(e):
                  print('Configuration validation working correctly')
              else:
                  raise
          "

      - name: Validate Prefect configuration
        run: |
          # Validate prefect.yaml syntax
          python -c "
          import yaml
          with open('prefect.yaml', 'r') as f:
              config = yaml.safe_load(f)
          print('prefect.yaml is valid')
          print(f'Found {len(config.get(\"deployments\", []))} deployment(s)')
          "

  build:
    name: Build and Validate
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Prefect
        run: |
          pip install prefect>=3.0.0

      - name: Build deployment artifacts
        run: |
          # Validate deployment configuration
          prefect deployment inspect hydrology-data-sync/hydrology-midnight-sync || echo "Deployment not yet created"
          
          # Check all required files exist
          echo "Checking required files..."
          for file in ftp_to_gcs_sync.py prefect.yaml; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            else
              echo "✗ $file missing"
              exit 1
            fi
          done

      - name: Create deployment preview
        run: |
          echo "Deployment configuration:"
          cat prefect.yaml

  deploy:
    name: Deploy to Prefect Cloud
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on push to gcs_upload branch, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/gcs_upload'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Prefect
        run: |
          pip install prefect>=3.0.0

      - name: Authenticate with Prefect Cloud
        env:
          PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
          PREFECT_API_URL: ${{ secrets.PREFECT_API_URL }}
        run: |
          # Set Prefect Cloud configuration from GitHub Secrets
          prefect config set PREFECT_API_KEY="${PREFECT_API_KEY}"
          prefect config set PREFECT_API_URL="${PREFECT_API_URL}"
          
          echo "✅ Prefect credentials configured"
          
          # Verify connection
          echo "Verifying Prefect Cloud connection..."
          prefect work-pool ls || echo "Could not list work pools"

      - name: Deploy to Prefect Cloud
        run: |
          echo "Deploying to Prefect Cloud..."
          
          # Check if work pool exists (should exist since geosfm-cloud-pool is already there)
          if prefect work-pool inspect geosfm-cloud-pool 2>/dev/null; then
            echo "✅ Work pool 'geosfm-cloud-pool' exists"
          else
            echo "⚠️  Work pool 'geosfm-cloud-pool' not found, but continuing..."
          fi
          
          # Deploy all deployments defined in prefect.yaml
          prefect deploy --all
          
          echo "✅ Deployment completed successfully!"

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          prefect deployment ls | grep hydrology || echo "Deployment list not available"
          
          # Show deployment details
          prefect deployment inspect hydrology-data-sync/hydrology-midnight-sync || echo "Could not inspect deployment"

  notify:
    name: Notify Status
    needs: [test, build, deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check status
        run: |
          if [ "${{ needs.test.result }}" == "success" ] && \
             [ "${{ needs.build.result }}" == "success" ] && \
             [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Pipeline deployed successfully!"
          else
            echo "❌ Pipeline deployment failed"
            echo "Test: ${{ needs.test.result }}"
            echo "Build: ${{ needs.build.result }}"
            echo "Deploy: ${{ needs.deploy.result }}"
            exit 1
          fi